<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OPD ตรวจสุขภาพ ชั้น 5 - ระบบสื่อสารด้วยใจ</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#4338ca" />
  <link rel="icon" type="image/png" href="https://img2.pic.in.th/35F9F2E4-F93B-4E93-8630-AA51B9AE5118.png">
  <link rel="apple-touch-icon" href="https://img2.pic.in.th/35F9F2E4-F93B-4E93-8630-AA51B9AE5118.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #eef2ff;
      font-family: "Sarabun", sans-serif;
      overflow: hidden;
    }
    .topbar {
      height: 56px;
      background: #4338ca;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-sizing: border-box;
    }
    .title {
      font-weight: 700;
      font-size: 16px;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 56px);
      border: none;
      display: block;
      background: white;
    }
    #installBtn {
      display: none;
      position: fixed;
      right: 20px;
      bottom: 20px;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      background: #4338ca;
      color: white;
      font-weight: 700;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">OPD ตรวจสุขภาพ ชั้น 5</div>
    <div>Ward App</div>
  </div>

  <iframe
    src="https://script.google.com/macros/s/AKfycbwi1Uj2CS4SKnzxBTNFgkHCmUQvYd8wkxKR5A25_H_6xAdS-F_hOoTIqDD_D8reTY1hLA/exec?view=ward&id=1780887310827">
  </iframe>

  <button id="installBtn">ติดตั้งแอป</button>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch(console.error);
      });
    }

    let deferredPrompt = null;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      installBtn.style.display = 'none';
    });
  </script>
</body>
</html>
