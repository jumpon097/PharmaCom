<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ปัทมา - ระบบสื่อสารด้วยใจ</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #f8fafc;
      font-family: "Sarabun", sans-serif;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>
  <iframe id="wardFrame" title="ปัทมา"></iframe>

  <script>
    const GAS_BASE = "https://script.google.com/macros/s/AKfycbwi1Uj2CS4SKnzxBTNFgkHCmUQvYd8wkxKR5A25_H_6xAdS-F_hOoTIqDD_D8reTY1hLA/exec";
    const WARD_ID = "1773360217137";

    const params = new URLSearchParams(window.location.search);
    const tab = params.get("tab") || "";
    const roomId = params.get("roomId") || "";
    const topic = params.get("topic") || "";
    const topicCode = params.get("topicCode") || "";
    const replyToken = params.get("replyToken") || "";
    const refMessageId = params.get("refMessageId") || "";

    const topicMap = {
      NEWS: "แจ้งข่าว",
      DRUGREADY: "ยาเสร็จ",
      NOTICE: "แจ้งเตือน",
      URGENT: "ด่วน"
    };

    const resolvedTopic = topicCode ? (topicMap[topicCode] || topicCode) : topic;

    const gasParams = new URLSearchParams();
    gasParams.set("view", "ward");
    gasParams.set("id", WARD_ID);

    if (replyToken) gasParams.set("replyToken", replyToken);
    if (tab) gasParams.set("tab", tab);
    if (roomId) gasParams.set("roomId", roomId);
    if (resolvedTopic) gasParams.set("topic", resolvedTopic);
    if (refMessageId) gasParams.set("refMessageId", refMessageId);

    document.getElementById("wardFrame").src = `${GAS_BASE}?${gasParams.toString()}`;
  </script>
</body>
</html>
